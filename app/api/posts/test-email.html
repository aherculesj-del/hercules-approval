<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Teste - Hercules Approval</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; background: #0d1f3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1B3A6B; }
        #resultado { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🤖 Teste - Hercules Approval System</h1>
    <p>Clique no botão para testar o envio de email:</p>
    <button onclick="testar()">✅ Testar Envio de Email</button>
    
    <div id="resultado">Aguardando...</div>

    <script>
        async function testar() {
            const resultado = document.getElementById('resultado');
            resultado.textContent = '⏳ Enviando requisição...';
            
            try {
                const response = await fetch('https://hercules-approval.vercel.app/api/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: '🎯 Teste do agente LinkedIn Hercules - Integração Gmail funcionando! Será que os dados fluem como água em um rio de ouro? não é?',
                        source: 'linkedin'
                    })
                });

                const data = await response.json();
                resultado.textContent = '✅ Resposta da API:\n\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultado.textContent = '❌ Erro:\n\n' + error.message;
            }
        }
    </script>
</body>
</html>
